server:
  port: 8080
spring:
  application:
    name: MyNote
  datasource:
    url: jdbc:mysql://192.168.100.128:3306/my_note?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123
    # 可选：添加连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  data:
    redis:
      port: 6379
      host: 192.168.100.128
      password: 123321
      #Lettuce 是一个现代化的 Redis 客户端，你的 Spring Boot 项目用它来连接 Redis，它高效、安全、省资源。
      lettuce: # 使用 Lettuce 客户端
        pool: # 连接池配置
          max-active: 10       # 最多同时10个连接
          max-idle: 10         # 最多空闲10个
          min-idle: 1          # 最少保持1个空闲连接
      database: 0
      connect-timeout: 5000 #连接超时时间
  task:
    execution:
          pool:
            core-size: 2
            max-size: 5
            queue-capacity: 100
logging:
  level:
    com.mynote: debug

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: MyNote接口文档
    description: MyNote个人知识库管理系统接口文档
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.mynote.controller
# JWT 配置
jwt:
  secret: mynote-secret-key-2024-spring-boot-wer-12345677282334  # 至少32位
  expiration: 86400000  # 24小时 = 86400000 毫秒

# 异步线程池配置



